name: Release
run-name: Release ${{ inputs.tag }}
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. 2.0.1) Please follow Semantic Versioning specifications.'
        required: true
        type: string

jobs:
  release:
    permissions:
      contents: write
    runs-on: ${{ matrix.host }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: ubuntu-24.04
            arch: amd64
            docker-image: node:20-bookworm
            docker-platform: linux/amd64
          - host: ubuntu-24.04-arm
            arch: arm64
            docker-image: node:20-bookworm
            docker-platform: linux/arm64
          - host: ubuntu-24.04
            arch: loong64
            docker-image: ghcr.io/loong64/node:20-trixie
            docker-platform: linux/loong64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up QEMU
        if: matrix.arch == 'loong64'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache Rust, pnpm, and target
        uses: actions/cache@v4
        with:
          path: |
            .cargo
            .rustup
            .pnpm-store
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.arch }}-build-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml', 'Cargo.lock', 'Cargo.toml', 'pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-build-

      - name: Build for ${{ matrix.arch }}
        run: |
          mkdir -p .cargo .rustup .pnpm-store
          docker run --rm \
            --platform ${{ matrix.docker-platform }} \
            -v $(pwd):/workspace \
            -w /workspace \
            -e NODE_ENV=pro \
            -e DEBIAN_FRONTEND=noninteractive \
            -e CARGO_HOME=/workspace/.cargo \
            -e RUSTUP_HOME=/workspace/.rustup \
            ${{ matrix.docker-image }} \
            bash -c "
              export PATH=\"\$CARGO_HOME/bin:\$PATH\" && \
              # 安装系统依赖
              apt-get update && \
              apt-get install -y \
                curl \
                wget \
                file \
                libgtk-3-dev \
                libwebkit2gtk-4.1-dev \
                libjavascriptcoregtk-4.1-dev \
                libsoup-3.0-dev \
                librsvg2-dev \
                patchelf \
                pkg-config \
                build-essential \
                xdg-utils && \
              \
              # 安装 Rust
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y && \
              . \"\$CARGO_HOME/env\" && \
              \
              # 安装 pnpm
              corepack enable && \
              corepack prepare pnpm@9 --activate && \
              \
              # 安装前端依赖
              if [ ${{ matrix.arch }} = "loong64" ]; then \
                sed -i '#@tauri-apps/cli#d' package.json && \
                pnpm add \
                  https://github.com/loong64/tauri/releases/download/tauri-cli-v2.6.2/tauri-apps-cli-2.6.2.tgz \
                  https://github.com/loong64/tauri/releases/download/tauri-cli-v2.6.2/tauri-apps-cli-linux-loong64-gnu-2.6.2.tgz; \
              fi && \
              pnpm config set store-dir /workspace/.pnpm-store && \
              pnpm install --frozen-lockfile && \
              pnpm build:pro
            "

      - name: Collect artifacts for ${{ matrix.arch }}
        run: |
          set -euo pipefail
          mkdir -p release-bin release-appimage release-deb release-rpm
          BIN_TARGET="release-bin/linglong-store-${{ matrix.arch }}"
          if [ -f src-tauri/target/release/linglong-store ]; then
            cp src-tauri/target/release/linglong-store "$BIN_TARGET"
            chmod +x "$BIN_TARGET"
          fi
          find src-tauri/target/release/bundle -maxdepth 2 -type f -name "*.AppImage" -exec cp {} release-appimage/ \; 2>/dev/null || true
          find src-tauri/target/release/bundle -maxdepth 2 -type f -name "*.deb" -exec cp {} release-deb/ \; 2>/dev/null || true
          find src-tauri/target/release/bundle -maxdepth 2 -type f -name "*.rpm" -exec cp {} release-rpm/ \; 2>/dev/null || true
          ls -la release-bin || true

      - name: Upload artifacts (${matrix.arch})
        uses: actions/upload-artifact@v4
        with:
          name: linglong-store-${{ matrix.arch }}
          path: |
            release-bin/linglong-store-${{ matrix.arch }}
            release-appimage/*.AppImage
            release-deb/*.deb
            release-rpm/*.rpm
          if-no-files-found: warn

  create-release:
    needs: release
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ inputs.tag }}
          target_commitish: ${{ github.sha }}
          name: '玲珑应用商店社区版 v${{ inputs.tag }}'
          body: |
            ## 玲珑应用商店社区版 ${{ inputs.tag }}
            
            ### 下载安装
            请根据您的 Linux 发行版和 CPU 架构选择对应的安装包：
            
            #### x86_64 (AMD64)
             🔹 `*-amd64.AppImage` / `*-x86_64.AppImage` - 通用格式，下载后添加可执行权限即可运行
             🔹 `*_amd64.deb` - 适用于 Debian/Ubuntu/Deepin 等发行版
             🔹 `*-amd64.rpm` - 适用于 Fedora/openSUSE 等发行版
             🔹 `linglong-store-amd64` - 原始可执行文件
            
            #### ARM64 (aarch64)
             🔹 `*-arm64.AppImage` / `*-aarch64.AppImage` - 通用格式，下载后添加可执行权限即可运行
             🔹 `*_arm64.deb` / `*_aarch64.deb` - 适用于 Debian/Ubuntu/Deepin 等发行版
             🔹 `*-arm64.rpm` / `*-aarch64.rpm` - 适用于 Fedora/openSUSE 等发行版
             🔹 `linglong-store-arm64` - 原始可执行文件

            #### LoongArch64 (loongarch64)
             🔹 `*-loong64.AppImage` / `*-loongarch64.AppImage` - 通用格式，下载后添加可执行权限即可运行
             🔹 `*_loong64.deb` / `*_loongarch64.deb` - 适用于 Debian/Ubuntu/Deepin 等发行版
             🔹 `*-loong64.rpm` / `*-loongarch64.rpm` - 适用于 Fedora/openSUSE 等发行版
             🔹 `linglong-store-loong64` - 原始可执行文件
            
            ### 系统要求
            - Linux 操作系统（支持 x86_64 ARM64 LoongArch64）
            - 已安装玲珑包管理器 (ll-cli)
            - GTK 3.0+
            - WebKit2GTK 4.1+
            
          draft: true
          prerelease: ${{ contains(inputs.tag, 'alpha') || contains(inputs.tag, 'beta') || contains(inputs.tag, 'rc') }}
          files: |
            artifacts/**/release-bin/*
            artifacts/**/release-appimage/*
            artifacts/**/release-deb/*
            artifacts/**/release-rpm/*
